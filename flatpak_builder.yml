app-id: io.github.joshuardecker.stig-view
runtime: org.freedesktop.Platform
runtime-version: "25.08"
sdk: org.freedesktop.Sdk
command: stig-view
finish-args:
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  - --share=ipc
  - --filesystem=host
modules:
  - name: stig-view-module
    buildsystem: simple
    build-commands:
      - install -Dm755 stig-view /app/bin/stig-view
      - install -Dm644 io.github.joshuardecker.stig-view.desktop /app/share/applications/io.github.joshuardecker.stig-view.desktop
      - install -Dm644 io.github.joshuardecker.stig-view.png /app/share/icons/hicolor/512x512/apps/io.github.joshuardecker.stig-view.png
    sources:
      - type: file
        path: target/release/stig-view
      - type: file
        path: assets/io.github.joshuardecker.stig-view.desktop
      - type: file
        path: assets/io.github.joshuardecker.stig-view.png
