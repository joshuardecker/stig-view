name: macOS

on:
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: cargo build --release -p stig-view-desktop

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: stig-view-macos
          path: target/release/stig-view
