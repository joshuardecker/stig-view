name: Rust

on:
  release:
    types: [created]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: cargo build --release

      - name: Upload
        uses: actions/upload-artifact@v2
        with:
          name: stig-view
          path: target/release/stig-view
