content = "Review the ASA configuration to determine if DH Group of 14 or greater has been specified for IKE Phase 1 as shown in the example below.\n\ncrypto ikev2 policy 1\n encryption aes-256\n …\n group 24\n\nIf DH Group of 14 or greater has not been specified for IKE Phase 1, this is a finding."
discussion = 'Use of an approved DH algorithm ensures the Internet Key Exchange (IKE) (Phase 1) proposal uses FIPS-validated key management techniques and processes in the production, storage, and control of private/secret cryptographic keys. The security of the DH key exchange is based on the difficulty of solving the discrete logarithm from which the key was derived. Hence, the larger the modulus, the more secure the generated key is considered to be.'
