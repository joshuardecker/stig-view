[[checks]]
pk = '59101993-0242-46d8-9fc1-50aa867475a3'
title = 'The Cisco ASA VPN gateway must use cryptographic algorithms approved by NSA to protect NSS when transporting classified traffic across an unclassified network.'
human_id = 'CASA-VN-000340'
group_title = 'SRG-NET-000565-VPN-002400'
nist_impact = 4
vulnerability_id = 'V-239962'
rule_id = 'SV-239962r878134_rule'
content = "Verify the VPN gateway is configured to use cryptography that is compliant with CSNA/CNSSP when transporting classified traffic across an unclassified network.\n\nStep 1: Verify CSNA/CNSSP-15 parameters have been configured for IKE Phase 1 as shown in the example below.\n\ncrypto ikev2 policy 2\n encryption aes-256\n integrity null\n group 19\n prf sha384\n\nStep 2: Determine the crypto map for IKE Phase 2 used in compliance with CSNA/CNSSP-15.\n\ncrypto map CSNA_MAP 10 set ikev2 ipsec-proposal aes-256\n\nStep 3: Verify the proposal specifies AES 256 parameters.\n\ncrypto ipsec ikev2 ipsec-proposal AES-256\n protocol esp encryption aes-256\n\nIf the VPN gateway is not configured to use cryptography that is compliant with CSNA/CNSSP-15 parameters when transporting classified traffic across an unclassified network, this is a finding."
discussion = "Use of weak or untested encryption algorithms undermines the purposes of utilizing encryption to protect data. The VPN gateway must implement cryptographic modules adhering to the higher standards approved by the Federal Government since this provides assurance they have been tested and validated.\n\nNIST cryptographic algorithms are approved by NSA to protect NSS. Based on an analysis of the impact of quantum computing, cryptographic algorithms specified by CNSSP-15 and approved for use in products in the CSfC program have been changed to more stringent protocols and configured with increased bit sizes and other secure characteristics to protect against quantum computing threats. The Commercial National Security Algorithm Suite (CNSA Suite) replaces Suite B."
fix = "Configure the VPN gateway to use cryptography that is compliant with CSNA/CNSSP-15 parameters when transporting classified traffic across an unclassified network as shown in the example below.\n\nStep 1: Configure the IKE Phase 1.\n\nASA2(config)# crypto ikev2 policy 2\nASA2(config-ikev2-policy)# encryption aes-256\nASA2(config-ikev2-policy)# integrity null\nASA2(config-ikev2-policy)# group 20\nASA2(config-ikev2-policy)# prf sha384\nASA2(config-ikev2-policy)# exit\n\nStep 2: Configure the IPsec proposal for AES 256 and apply to a crypto map as shown in the example below.\n\nASA2(config-ipsec-proposal)# protocol esp encryption aes-256\nASA2(config-ipsec-proposal)# exit\nASA2(config)# crypto map CSNA_MAP 10 set ikev2 ipsec-proposal AES-256\nASA2(config)# end"
ccis = [2450]

[[checks]]
pk = '77cbb9cc-5544-4c42-8b29-43b77a031546'
title = 'The Cisco ASA VPN gateway must be configured to renegotiate the IPsec Security Association after eight hours or less.'
human_id = 'CASA-VN-000350'
group_title = 'SRG-NET-000337-VPN-001290'
nist_impact = 3
vulnerability_id = 'V-239963'
rule_id = 'SV-239963r1015263_rule'
content = "Verify the VPN gateway renegotiates the security association after eight hours or less as shown in the example below.\n\ncrypto map IPSEC_MAP 10 match address SITE1_SITE2\ncrypto map IPSEC_MAP 10 set peer x.x.x.x\n…\n…\n…\ncrypto map IPSEC_MAP 10 set security-association lifetime seconds 3600\n\nIf the VPN Gateway does not renegotiate the security association after eight hours or less, this is a finding."
discussion = "The IPsec security association (SA) and its corresponding key will expire either after the number of seconds or amount of traffic volume has exceeded the configured limit. A new SA is negotiated before the lifetime threshold of the existing SA is reached to ensure that a new SA is ready for use when the old one expires. The longer the lifetime of the IPsec SA, the longer the lifetime of the session key used to protect IP traffic. The SA is less secure with a longer lifetime because an attacker has a greater opportunity to collect traffic encrypted by the same key and subject it to cryptanalysis. However, a shorter lifetime causes IPsec peers to renegotiate Phase 2, more often resulting in the expenditure of additional resources.\n\nSpecify the lifetime (in seconds) of an Internet Key Exchange (IKE) SA. When the SA expires, it is replaced by a new SA, the Security Parameter Index (SPI), or terminated if the peer cannot be contacted for renegotiation."
fix = "Configure the VPN gateway to renegotiate the security association after eight hours or less as shown in the example below.\n\nASA1(config)# crypto map IPSEC_MAP 10 set security-association lifetime seconds 28800\nASA1(config)# end"
ccis = [2038, 4895]

[[checks]]
pk = 'd07530de-108c-46c9-933c-9e26a93a3e9c'
title = 'The Cisco ASA VPN gateway must be configured to renegotiate the IKE security association after 24 hours or less.'
human_id = 'CASA-VN-000360'
group_title = 'SRG-NET-000337-VPN-001300'
nist_impact = 3
vulnerability_id = 'V-239964'
rule_id = 'SV-239964r1015264_rule'
content = "Verify the VPN gateway renegotiates the IKE security association after 24 hours or less as shown in the example below.\n\ncrypto ikev2 policy 2\n encryption …\n …\n …\n …\n lifetime seconds 86400\n\nIf the VPN gateway does not renegotiate the IKE security association after 24 hours or less, this is a finding."
discussion = 'When a VPN gateway creates an IPsec security association (SA), resources must be allocated to maintain the SA. These resources are wasted during periods of IPsec endpoint inactivity, which could result in the gateway’s inability to create new SAs for other endpoints, thereby preventing new sessions from connecting. The Internet Key Exchange (IKE) idle timeout may also be set to allow SAs associated with inactive endpoints to be deleted before the SA lifetime has expired, although this setting is not recommended at this time. The value of one hour or less is a common best practice.'
fix = "Configure the VPN gateway to renegotiate the IKE security association after 24 hours or less as shown in the example below.\n\nASA2(config)# crypto ikev2 policy 2\nASA2(config-ikev2-policy)# lifetime seconds 86400\nASA2(config-ikev2-policy)# end"
ccis = [2038, 4895]

[[checks]]
pk = '0cb0720f-6b2c-447e-9000-7f78a88923b3'
title = 'The Cisco ASA remote access VPN server must be configured to use a separate authentication server than that used for administrative access.'
human_id = 'CASA-VN-000390'
group_title = 'SRG-NET-000166-VPN-000580'
nist_impact = 3
vulnerability_id = 'V-239965'
rule_id = 'SV-239965r666301_rule'
content = "In the example below, radius server at 10.1.1.2 is used for administrative access authentication while the LDAP server will be used for granting remote access to the network.\n\naaa-server LDAP protocol ldap\naaa-server LDAP (INSIDE) host 10.1.1.1\n…\n…\n…\naaa-server RADIUS_GROUP protocol radius\naaa-server RADIUS_GROUP (INSIDE) host 10.1.1.2\n key *****\n…\n…\n…\naaa authentication serial console RADIUS_GROUP LOCAL\naaa authentication ssh console RADIUS_GROUP LOCAL\n\nIf the ASA is not configured to use a separate authentication server than that used for administrative access, this is a finding."
discussion = 'The VPN interacts directly with public networks and devices and should not contain user authentication information for all users. AAA network security services provide the primary framework through which a network administrator can set up access control and authorization on network points of entry or network access servers. It is not advisable to configure access control on the VPN gateway or remote access server. Separation of services provides added assurance to the network if the access control server is compromised.'
fix = "Configure the ASA to use a separate authentication server as shown in the example below.\n\nASA2(config)# aaa-server LDAP protocol ldap\nASA2(config)# aaa-server LDAP (INSIDE) host 10.1.1.1"
ccis = [187]

[[checks]]
pk = '67aeb980-fd7a-407d-a177-c5db37c4da4e'
title = 'The Cisco ASA remote access VPN server must be configured to use LDAP over SSL to determine authorization for granting access to the network.'
human_id = 'CASA-VN-000400'
group_title = 'SRG-NET-000320-VPN-001120'
nist_impact = 3
vulnerability_id = 'V-239966'
rule_id = 'SV-239966r1001252_rule'
content = "Step 1: Verify that authorization is enforced as shown in the example below.\n\ntunnel-group ANY_CONNECT type remote-access\ntunnel-group ANY_CONNECT general-attributes\n authorization-server-group LDAP\n authorization-required\n\nStep 2: Verify that LDAP over SSL has been enabled.\n\naaa-server LDAP protocol ldap\naaa-server LDAP (INSIDE) host 10.1.1.1\n ldap-over-ssl enable\n\nIf the ASA is not configured to use LDAP over SSL to determine authorization for granting access to the network, this is a finding."
discussion = "Protecting authentication communications between the client, the VPN Gateway, and the authentication server keeps this critical information from being exploited.\n\nIn distributed information systems, authorization processes and access control decisions may occur in separate parts of the systems. In such instances, authorization information is transmitted securely so timely access control decisions can be enforced at the appropriate locations. To support the access control decisions, it may be necessary to transmit as part of the access authorization information, supporting security attributes. This is due to the fact that in distributed information systems, there are various access control decisions that need to be made and different entities (e.g., services) make these decisions in a serial fashion, each requiring some security attributes to make the decisions.\n\nThis applies to VPN gateways that have the concept of a user account and have the login function residing on the VPN gateway."
fix = "Step 1: Configure the ASA to use LDAP over SSL as shown in the example below.\n\nASA2(config)# aaa-server LDAP protocol ldap\nASA2(config)# aaa-server LDAP (INSIDE) host 10.1.1.1\nASA2(config-aaa-server-host)# ldap-over-ssl enable\nASA2(config-aaa-server-host)# exit\n\nStep 2: Configure the ASA to enforce authorization using the common name (CN) from the user’s certificate.\n\nASA2(config)# tunnel-group ANY_CONNECT general-attributes\nASA2(config-tunnel-general)# authorization-required\nASA2(config-tunnel-general)# authorization-server-group LDAP\nASA2(config-tunnel-general)# end"
ccis = [2353]

[[checks]]
pk = '2e4632a3-bc04-483c-8c85-94b61e1b45ae'
title = 'The Cisco ASA remote access VPN server must be configured to identify and authenticate users before granting access to the network.'
human_id = 'CASA-VN-000410'
group_title = 'SRG-NET-000138-VPN-000490'
nist_impact = 3
vulnerability_id = 'V-239967'
rule_id = 'SV-239967r666307_rule'
content = "Verify the ASA is configured to uniquely identify and authenticate users before granting access to the network as shown in the example below.\n\ntunnel-group ANY_CONNECT type remote-access\ntunnel-group ANY_CONNECT webvpn-attributes\n authentication certificate\n\nIf the ASA is not configured to identify and authenticate users before granting access to the network, this is a finding."
discussion = "To assure accountability and prevent unauthenticated access, organizational users must be identified and authenticated to prevent potential misuse and compromise of the system.\n\nOrganizational users include organizational employees or individuals the organization deems to have equivalent status of employees (e.g., contractors). Organizational users (and any processes acting on behalf of users) must be uniquely identified and authenticated for all accesses except the following:\n\n(i) Accesses explicitly identified and documented by the organization. Organizations document specific user actions that can be performed on the information system without identification or authentication; and\n\n(ii) Accesses that occur through authorized use of group authenticators without individual authentication. Organizations may require unique identification of individuals' in-group accounts (e.g., shared privilege accounts) or for detailed accountability of individual activity.\n\nThis requirement only applies to components where this is specific to the function of the device or has the concept of an organizational user (e.g., VPN or proxy capability). This does not apply to authentication for the purpose of configuring the device itself (i.e., device management)."
fix = "Configure the ASA to uniquely identify and authenticate users before granting access to the network.\n\nASA1(config)# tunnel-group ANY_CONNECT webvpn-attributes\nASA1(config-tunnel-webvpn)# authentication certificate\nASA1(config-tunnel-webvpn)# end"
ccis = [764]

[[checks]]
pk = '370e976a-0244-469c-874c-366e3a1db060'
title = 'The Cisco ASA remote access VPN server must be configured to enforce certificate-based authentication before granting access to the network.'
human_id = 'CASA-VN-000440'
group_title = 'SRG-NET-000140-VPN-000500'
nist_impact = 4
vulnerability_id = 'V-239968'
rule_id = 'SV-239968r954210_rule'
content = "Review the ASA configuration to verify that it enforces certificate-based authentication before granting access to the network as shown in the example below.\n\ntunnel-group ANY_CONNECT type remote-access\ntunnel-group ANY_CONNECT webvpn-attributes\n authentication certificate\n\nIf the ASA configuration does not enforce certificate-based authentication before granting access to the network, this is a finding."
discussion = "To assure accountability and prevent unauthenticated access, non-privileged users must utilize multifactor authentication to prevent potential misuse and compromise of the system.\n\nMultifactor authentication uses two or more factors to achieve authentication. Use of password for user remote access for non-privileged account is not authorized.\n\nFactors include:\n(i) Something you know (e.g., password/PIN);\n(ii) Something you have (e.g., cryptographic identification device, token); or\n(iii) Something you are (e.g., biometric).\n\nA non-privileged account is any information system account with authorizations of a non-privileged user.\n\nNetwork access is any access to a network element by a user (or a process acting on behalf of a user) communicating through a network.\n\nThe DoD CAC with DoD-approved PKI is an example of multifactor authentication."
fix = "Configure the ASA to enforce certificate-based authentication before granting access to the network as shown in the example below.\n\nASA1(config)# tunnel-group ANY_CONNECT webvpn-attributes\nASA1(config-tunnel-webvpn)# authentication certificate\nASA1(config-tunnel-webvpn)# end"
ccis = [766]

[[checks]]
pk = '431e9da2-618b-42de-985e-d3d33c86c13e'
title = 'The Cisco ASA remote access VPN server must be configured to map the distinguished name (DN) from the client’s certificate to entries in the authentication server to determine authorization to access the network.'
human_id = 'CASA-VN-000450'
group_title = 'SRG-NET-000166-VPN-000590'
nist_impact = 3
vulnerability_id = 'CASA-VN-000450'
rule_id = 'CASA-VN-000450_rule'
content = "Review the tunnel group configured for remote access and verify that the DN from the client’s certificate is used to map to entries in the authentication server to determine authorization as shown in the example below.\n\ntunnel-group ANY_CONNECT type remote-access\ntunnel-group ANY_CONNECT general-attributes\n authorization-server-group LDAP\n authorization-required\n username-from-certificate use-entire-name\n\nIf the ASA is not configured to map the distinguished name from the client’s certificate to entries in the authentication server to determine authorization, this is a finding."
discussion = "Without mapping the certificate used to authenticate to the user account, the ability to determine the identity of the individual user or group will not be available for forensic analysis.\n\nThis requirement only applies to components where this is specific to the function of the device or has the concept of a user (e.g., VPN or ALG. This does not apply to authentication for the purpose of configuring the device itself (i.e., device management)."
fix = "Configure the ASA to map the distinguished name from the client’s certificate to entries in the authentication server to determine authorization as shown in the example.\n\nASA2(config)# tunnel-group ANY_CONNECT general-attributes\nASA2(config-tunnel-general)# authorization-required\nASA2(config-tunnel-general)# authorization-server-group LDAP\nASA2(config-tunnel-general)# username-from-certificate username-from-certificate use-entire-name\nASA2(config-tunnel-general)# end"
ccis = [187]

