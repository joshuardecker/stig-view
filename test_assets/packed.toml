[[checks]]
pk = '2c8f7fc9-82b6-4e47-acf7-61112dfbd84b'
title = 'The Cisco ASA must be configured to validate certificates via a trustpoint that identifies a DoD or DoD-approved certificate authority.'
human_id = 'CASA-VN-000120'
group_title = 'SRG-NET-000164-VPN-000560'
nist_impact = 3
vulnerability_id = 'CASA-VN-000120'
rule_id = 'CASA-VN-000120_rule'
content = "If PKI certificates are not implemented on the ASA, this requirement is not applicable.\n\nStep 1: Review the ASA configuration to determine if a CA trust point has been configured as shown in the example below.\n\ncrypto ca trustpoint CA_X\n enrollment terminal\n\nStep 2: Verify the CA is a DoD or DoD-approved service provider by entering the following command: show crypto ca certificates\nThe output will list the following information for each certificate:\n\nAssociated Trustpoints: (will map to a configured trustpoint from Step 1)\nCommon Name (CN) of the issuer\nOrganization Unit (OU) of the issuer\nOrganization (O) of the issuer\nValidity Date\n\nIf the ASA is not configured to obtain its public key certificates from a DoD or DoD-approved service provider, this is a finding."
discussion = "Without path validation, an informed trust decision by the relying party cannot be made when presented with any certificate not already explicitly trusted. To meet this requirement, the information system must create trusted channels between itself and remote trusted authorized IT product (e.g., syslog server) entities that protect the confidentiality and integrity of communications. The information system must create trusted paths between itself and remote administrators and users that protect the confidentiality and integrity of communications.\n\nA trust anchor is an authoritative entity represented via a public key and associated data. It is most often used in the context of public key infrastructures, X.509 digital certificates, and DNSSEC. However, applications that do not use a trusted path are not approved for non-local and remote management of DoD information systems.\n\nUse of SSHv2 to establish a trusted channel is approved. Use of FTP, TELNET, HTTP, and SNMPV1 is not approved since they violate the trusted channel rule set. Use of web management tools that are not validated by common criteria may also violate the trusted channel rule set.\n\nWhen there is a chain of trust, usually the top entity to be trusted becomes the trust anchor; it can be, for example, a Certification Authority (CA). A certification path starts with the subject certificate and proceeds through a number of intermediate certificates up to a trusted root certificate, typically issued by a trusted CA.\n\nThis requirement verifies that a certification path to an accepted trust anchor is used for certificate validation and that the path includes status information. Path validation is necessary for a relying party to make an informed trust decision when presented with any certificate not already explicitly trusted. Status information for certification paths includes certificate revocation lists or online certificate status protocol responses. Validation of the certificate status information is out of scope for this requirement."
fix = 'Ensure that certificate requests are only sent to DoD or DoD-approved service providers.'
ccis = [185]

