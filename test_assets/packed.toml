[[checks]]
pk = '4ed8b928-a14f-4ae7-8685-d276f3379051'
title = 'The Cisco ASA VPN remote access server must be configured to generate log records when successful and/or unsuccessful VPN connection attempts occur.'
human_id = 'CASA-VN-000720'
group_title = 'SRG-NET-000492-VPN-001980'
nist_impact = 3
vulnerability_id = 'CASA-VN-000720'
rule_id = 'CASA-VN-000720_rule'
content = "Verify the ASA generates log records when successful and/or unsuccessful VPN connection attempts occur as shown in the example below.\n\nlogging host INSIDE 10.1.1.12\nlogging class svc trap notifications\n\nIf the ASA does not generate log records when successful and/or unsuccessful VPN connection attempts occur, this is a finding."
discussion = "Without generating log records that are specific to the security and mission needs of the organization, it would be difficult to establish, correlate, and investigate the events relating to an incident, or identify those responsible for one.\n\nLog records can be generated from various components within the information system (e.g., module or policy filter).\n\nThis requirement only applies to components where this is specific to the function of the device, such as application layer gateway (ALG), which provides these access control and auditing functions on behalf of an application. This does not apply to audit logs generated on behalf of the device itself (management)."
fix = "Configure the ASA to generate log records when successful and/or unsuccessful VPN connection attempts occur as shown in the example below.\n\nASA2(config)# logging class svc trap notifications"
ccis = [172]

