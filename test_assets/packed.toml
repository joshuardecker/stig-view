content = "Verify the ASA disables split-tunneling for remote clients VPNs as shown in the example below.\n\ngroup-policy ANY_CONNECT_GROUP attributes\n …\n …\n …\n split-tunnel-policy tunnelall\n\nIf the ASA does not disable split-tunneling for remote clients VPNs, this is a finding.\n\nNote: Certain cloud products require direct connectivity to operate correctly. These items may be excluded from the split tunneling restriction if documented and approved.\n\nIf split-tunneling for remote client VPNs is enabled by the above exception, verify only authorized external destinations are excluded from tunneling as shown in the example below:\n\nWebvpn\nanyconnect-custom-attr dynamic-split-exclude-domains description DoD IL5 Authorized Destinations\nanyconnect-custom-data dynamic-split-exclude-domains DoD-IL5 dod.teams.microsoft.us,azureedge.net,core.usgovcloudapi.net,streaming.media.usgovcloudapi.net,wvd.azure.us,cdn.office365.us\n\n anyconnect-custom dynamic-split-exclude-domains value DoD-IL5\n\n If any unauthorized exempted connections exist, this is a finding."
discussion = "Split tunneling would in effect allow unauthorized external connections, making the system more vulnerable to attack and to exfiltration of organizational information.\n\nA VPN hardware or software client with split tunneling enabled provides an unsecured backdoor to the enclave from the internet. With split tunneling enabled, a remote client has access to the internet while at the same time has established a secured path to the enclave via an IPsec tunnel. A remote client connected to the internet that has been compromised by an attacker in the internet provides an attack base to the enclave’s private network via the IPsec tunnel. Hence, it is imperative that the VPN gateway enforces a no split-tunneling policy to all remote clients."
fix = "Configure the ASA to disable split-tunneling for remote clients VPNs as shown in the example below.\n\nASA2(config)# group-policy ANY_CONNECT_GROUP attributes\nASA2(config-group-policy)# split-tunnel-policy tunnelall\nASA2(config-group-policy)# end"
