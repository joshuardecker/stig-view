[[checks]]
pk = '3022d481-31eb-4f91-a785-1b529cc6f574'
title = 'The Cisco ASA VPN remote access server must be configured to validate certificates used for Transport Layer Security (TLS) functions by performing RFC 5280-compliant certification path validation.'
human_id = 'CASA-VN-000730'
group_title = 'SRG-NET-000580-VPN-002410'
nist_impact = 3
vulnerability_id = 'V-239984'
rule_id = 'SV-239984r666358_rule'
content = "Verify the ASA validates TLS certificates by performing RFC 5280-compliant certification path validation.\n\nReview the ASA configuration to determine if a CA trust point has been configured as shown in the example below.\n\ncrypto ca trustpoint CA_X\n enrollment …\n validation-usage ipsec-client\n validation-usage ssl-client\n\nIf the ASA does not validate certificates used for TLS functions by performing RFC 5280-compliant certification path validation, this is a finding."
discussion = "A certificate's certification path is the path from the end entity certificate to a trusted root certification authority (CA). Certification path validation is necessary for a relying party to make an informed decision regarding acceptance of an end entity certificate.\n\nCertification path validation includes checks such as certificate issuer trust, time validity, and revocation status for each certificate in the certification path. Revocation status information for CA and subject certificates in a certification path is commonly provided via certificate revocation lists (CRLs) or online certificate status protocol (OCSP) responses."
fix = "Configure the ASA to validate certificates used for TLS functions by performing RFC 5280- compliant certification path validation as shown in the example below.\n\nASA2(config)# crypto ca trustpoint CA_X\nASA2(config-ca-trustpoint)# validation-usage ssl-client\nASA2(config-ca-trustpoint)# validation-usage ipsec-client"
ccis = [185]

[[checks]]
pk = 'bd26a835-68ba-4e92-af53-4f28f1ccc101'
title = 'The Cisco ASA VPN remote access server must be configured to use an approved High Assurance Commercial Solution for Classified (CSfC) cryptographic algorithm for remote access to a classified network.'
human_id = 'CASA-VN-000760'
group_title = 'SRG-NET-000565-VPN-002390'
nist_impact = 4
vulnerability_id = 'CASA-VN-000760'
rule_id = 'CASA-VN-000760_rule'
content = "Verify the ASA uses an approved High Assurance CSfC cryptographic algorithm for remote access to a classified network.\n\nStep 1: Verify that Suite B parameters have been configured for IKE Phase 1 as shown in the example below.\n\ncrypto ikev2 policy 2\n encryption aes-gcm-256\n integrity null\n group 19\n prf sha384\n\nStep 2: Determine the crypto map for IKE Phase 2 used for Suite B.\n\ncrypto map SUITE_B_MAP 10 set ikev2 ipsec-proposal AES-GCM-256\n\nStep 3: Verify that the proposal specifies Suite B parameters.\n\ncrypto ipsec ikev2 ipsec-proposal AES-GCM-256\n protocol esp encryption aes-gcm-256\n\nNote: The CSfC initiative assures the confidentiality and interoperability of solutions through the use of Suite B algorithms.\n\nIf the ASA is not configured to use an approved High Assurance Commercial Solution for Classified (CSfC) cryptographic algorithm for remote access to a classified network, this is a finding."
discussion = "Use of improperly configured or lower assurance equipment and solutions could compromise high-value information.\n\nThe National Security Agency/Central Security Service's (NSA/CSS) CSfC Program enables commercial products to be used in layered solutions to protect classified National Security Systems (NSS) data. Currently, Suite B cryptographic algorithms are specified by the National Institute of Standards and Technology (NIST) and are used by NSA's Information Assurance Directorate in solutions approved for protecting classified and unclassified NSS. However, quantum resistant algorithms will be required for future Suite B implementations."
fix = "Configure the ASA to use an approved High Assurance CSfC cryptographic algorithm for remote access to a classified network.\n\nStep 1: Configure the IKE Phase 1.\n\nASA2(config)# crypto ikev2 policy 2\nASA2(config-ikev2-policy)# encryption aes-gcm-256\nASA2(config-ikev2-policy)# integrity null\nASA2(config-ikev2-policy)# group 20\nASA2(config-ikev2-policy)# prf sha384\nASA2(config-ikev2-policy)# exit\n\nStep 2: Configure the IPsec proposal for Suite B and apply to a crypto map as shown in the example below.\n\nASA2(config-ipsec-proposal)# protocol esp encryption aes-gcm-256\nASA2(config-ipsec-proposal)# exit\nASA2(config)# crypto map SUITE_B_MAP 10 set ikev2 ipsec-proposal AES-GCM-256\nASA2(config)# end"
ccis = [2450]

