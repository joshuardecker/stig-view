fix = "Configure the ASA to generate traffic log entries containing information to establish when the events occurred.\n\nASA(config)# logging timestamp"
ccis = [131]

[[checks]]
pk = 'fada56ba-48bf-403e-ace0-5b78fd1a7187'
title = 'The Cisco ASA must be configured to queue log records locally In the event that the central audit server is down or not reachable.'
human_id = 'CASA-VN-000080'
group_title = 'SRG-NET-000336-VPN-001280'
nist_impact = 3
vulnerability_id = 'CASA-VN-000080'
rule_id = 'CASA-VN-000080_rule'
content = "If the ASA is configured to send syslog messages to a TCP-based syslog server, and if the syslog server is down new connections are blocked. To continue to allow new connections and queue log records verify that the logging permit-hostdown and the queue size has been increased (default is 512).\n\nlogging enable\n…\n…\n…\nlogging queue 8192\nlogging host INSIDE 10.1.22.2 6/1470\nlogging permit-hostdown\n\nIf the ASA is not configured to queue log records locally In the event that the central audit server is down or not reachable, this is a finding."
discussion = "If the system were to continue processing after audit failure, actions can be taken on the system that cannot be tracked and recorded for later forensic analysis.\n\nBecause of the importance of ensuring mission/business continuity, organizations may determine that the nature of the audit failure is not so severe that it warrants a complete shutdown of the application supporting the core organizational missions/business operations. In those instances, partial application shutdowns or operating in a degraded mode with reduced capability may be viable alternatives.\n\nThis requirement only applies to components where this is specific to the function of the device (e.g., IDPS sensor logs, firewall logs). This does not apply to audit logs generated on behalf of the device itself (management)."
fix = "To continue to allow new connections and queue log records in the event the syslog server is not reachable, configure logging permit-hostdown and increase the queue size.\n\nASA(config)# logging permit-hostdown\nASA(config)# logging queue 8192"
ccis = [1861]

