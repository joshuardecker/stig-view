[[checks]]
pk = '933a25fd-891c-4f90-bd0d-72255fe459b4'
title = 'The Cisco ASA remote access VPN server must be configured to use a FIPS-validated algorithm and hash function to protect the integrity of TLS remote access sessions.'
human_id = 'CASA-VN-000560'
group_title = 'SRG-NET-000063-VPN-000210'
nist_impact = 3
vulnerability_id = 'V-239976'
rule_id = 'SV-239976r769253_rule'
content = "Verify the remote access ASA uses a FIPS-validated algorithms and hash function as shown in the example below.\n\nssl server-version tlsv1.2\nssl cipher tlsv1.2 fips\n\nIf the remote access ASA does not use a digital signature generated using FIPS-validated algorithms and hash function, this is a finding."
discussion = "Without integrity protection, unauthorized changes may be made to the log files and reliable forensic analysis and discovery of the source of malicious system activity may be degraded.\n\nRemote access (e.g., RDP) is access to DoD nonpublic information systems by an authorized user (or an information system) communicating through an external, non-organization-controlled network. Remote access methods include broadband and wireless.\n\nIntegrity checks include cryptographic checksums, digital signatures, or hash functions. Federal Information Processing Standard (FIPS) 186-4, Digital Signature Standard (DSS), specifies three NIST-approved algorithms: DSA, RSA, and ECDSA. All three are used to generate and verify digital signatures in conjunction with an approved hash function."
fix = "Configure the remote access ASA to use a digital signature generated using FIPS-validated algorithms and an approved hash.\n\nASA1(config)# ssl cipher tlsv1.2 fips\nASA1(config)# end"
ccis = [1453]

[[checks]]
pk = '07492f6a-b818-41c9-8894-8f300c0968e4'
title = 'The Cisco ASA remote access VPN server must be configured to generate unique session identifiers using a FIPS-validated Random Number Generator (RNG) based on the Deterministic Random Bit Generators (DRBG) algorithm.'
human_id = 'CASA-VN-000610'
group_title = 'SRG-NET-000234-VPN-000810'
nist_impact = 3
vulnerability_id = 'V-239977'
rule_id = 'SV-239977r666337_rule'
content = "Review the ASA configuration to verify that FIPS mode has been enabled as shown in the example below.\n\nASA Version x.x\n!\nhostname  ASA1\nfips enable\n\nIf the ASA is not configured to be enabled in FIPS mode, this is a finding."
discussion = "Both IPsec and TLS gateways use the RNG to strengthen the security of the protocols. Using a weak RNG will weaken the protocol and make it more vulnerable.\n\nUse of a FIPS validated RNG that is not DRGB mitigates to a CAT III."
fix = "Configure the ASA to have FIPS-mode enabled as shown in the example below.\n\nASA1(config)# fips enable\nASA1(config)# end\n\nNote: FIPS mode change will not take effect until the configuration is saved and the device rebooted."
ccis = [1188]

[[checks]]
pk = '4f308c8e-23f0-4395-be83-fce03798d7ba'
title = 'The Cisco ASA remote access VPN server must be configured to use SHA-2 or greater for hashing to protect the integrity of IPsec remote access sessions.'
human_id = 'CASA-VN-000630'
group_title = 'SRG-NET-000063-VPN-000220'
nist_impact = 3
vulnerability_id = 'V-239978'
rule_id = 'SV-239978r769254_rule'
content = "Verify the ASA SHA-2 or greater for hashing to protect the integrity of IPsec remote access sessions as shown in the example below.\n\nStep 1: Verify that SHA-2 or greater is used for IKE Phase 1 as shown in the example below.\n\ncrypto ikev2 policy 1\n…\n…\n…\n integrity sha256\n\nStep 2: Verify that SHA-2 or greater is used for the IPsec Security Association.\n\ncrypto ipsec ikev2 ipsec-proposal IPSEC_TRANS\n protocol esp integrity sha-256\n\nIf the ASA does not use SHA-2 or greater for hashing to protect the integrity of IPsec remote access sessions, this is a finding."
discussion = "Without strong cryptographic integrity protections, information can be altered by unauthorized users without detection.\n\nSHA-1 is considered a compromised hashing standard and is being phased out of use by industry and Government standards. DoD systems must not be configured to use SHA-1 for integrity of remote access sessions.\n\nThe remote access VPN provides access to DoD non-public information systems by an authorized user (or an information system) communicating through an external, non-organization-controlled network."
fix = "Configure the ASA to use SHA-2 or greater for hashing to protect the integrity of IPsec remote access sessions as shown in the example below.\n\nASA1(config)# crypto ikev2 policy 1\nASA1(config-ikev2-policy)# integrity sha256\nASA1(config-ikev2-policy)# exit\nASA1(config)# crypto ipsec ikev2 ipsec-proposal IPSEC_TRANS\nASA1(config-ipsec-proposal)# protocol esp integrity sha-256\nASA1(config-ikev2-policy)# end"
ccis = [1453]

