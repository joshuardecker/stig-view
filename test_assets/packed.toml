[[checks]]
pk = '2a78d8e5-60d7-4841-9f72-e3f064791563'
title = 'The Cisco ASA remote access VPN server must be configured to use TLS 1.2 or higher to protect the confidentiality of remote access connections.'
human_id = 'CASA-VN-000550'
group_title = 'SRG-NET-000062-VPN-000200'
nist_impact = 4
vulnerability_id = 'CASA-VN-000550'
rule_id = 'CASA-VN-000550_rule'
content = "Verify the TLS ASA is configured to use TLS 1.2 or higher as shown in the example below.\n\nssl server-version tlsv1.2\n\nNote: ASA supports TLS version 1.2 starting from software version 9.3.1 for secure message transmission for Clientless SSL VPN and AnyConnect VPN.\n\nIf the ASA is not configured to use TLS 1.2 or higher to protect the confidentiality of sensitive data during transmission, this is a finding."
discussion = "Using older unauthorized versions or incorrectly configuring protocol negotiation makes the gateway vulnerable to known and unknown attacks that exploit vulnerabilities in this protocol.\n\nNIST SP 800-52 provides guidance for client negotiation on either DoD-only or public-facing servers."
fix = "Configure the ASA to use TLS 1.2 or higher as shown in the example below.\n\nASA1(config)# ssl server-version tlsv1.2"
ccis = [68]

