[[checks]]
pk = '471fc0c4-7e75-4f55-9245-d744bf6a8a3b'
title = 'The Cisco ASA must be configured to specify Perfect Forward Secrecy (PFS) for the IPsec Security Association (SA) during IKE Phase 2 negotiation.'
human_id = 'CASA-VN-000180'
group_title = 'SRG-NET-000371-VPN-001640'
nist_impact = 3
vulnerability_id = 'V-239954'
rule_id = 'SV-239954r916233_rule'
content = "Review crypto maps that reference an IPsec proposal. Verify the ASA is configured to specify PFS as shown in the example below.\n\ncrypto map IPSEC_CRYPTO_MAP 1 set pfs group5\ncrypto map IPSEC_CRYPTO_MAP 1 set peer x.x.x.x\ncrypto map IPSEC_CRYPTO_MAP 1 set ikev2 ipsec-proposal IPSEC_TRANS\n\nIf the ASA is not configured to specify PFS for the IPsec SA during IKE Phase 2 negotiation, this is a finding."
discussion = "PFS generates each new encryption key independently from the previous key. Without PFS, compromise of one key will compromise all communications.\n\nThe Phase 2 (Quick Mode) Security Association (SA) is used to create an IPsec session key. Hence, its rekey or key regeneration procedure is very important. The Phase 2 rekey can be performed with or without Perfect Forward Secrecy (PFS). With PFS, every time a new IPsec Security Association is negotiated during the Quick Mode, a new Diffie-Hellman (DH) exchange occurs. The new DH shared secret will be included with original keying material (SYKEID_d, initiator nonce, and responder nonce from Phase 1 for generating a new IPsec session key. If PFS is not used, the IPsec session key will always be completely dependent on the original keying material from Phase 1. Hence, if an older key is compromised at any time, it is possible that all new keys may be compromised.\n\nThe DH exchange is performed in the same manner as was done in Phase 1 (Main or Aggressive Mode). However, the Phase 2 exchange is protected by encrypting the Phase 2 packets with the key derived from the Phase 1 negotiation. Because DH negotiations during Phase 2 are encrypted, the new IPsec session key has an added element of secrecy."
fix = "Configure the ASA to specify PFS for the IPsec SA during IKE Phase 2 negotiation as shown in the example below.\n\nASA3(config)# crypto map IPSEC_CRYPTO_MAP 1 set pfs group5"
ccis = [2418]

[[checks]]
pk = 'c2a257b0-5547-4b45-b194-3c5f16e1abe6'
title = 'The Cisco ASA must be configured to use a FIPS-validated cryptographic module to generate cryptographic hashes.'
human_id = 'CASA-VN-000190'
group_title = 'SRG-NET-000510-VPN-002160'
nist_impact = 3
vulnerability_id = 'V-239955'
rule_id = 'SV-239955r769243_rule'
content = "Verify the ASA is configured to use a FIPS-validated cryptographic module to generate cryptographic hashes.\n\nStep 1: Verify that a FIPS-validated hash is used for IKE Phase 1 as shown in the example below.\n\ncrypto ikev2 policy 1\n…\n…\n…\n integrity sha256\n\nStep 2: Verify that a FIPS-validated hash is used for the IPsec SA.\n\ncrypto ipsec ikev2 ipsec-proposal IPSEC_TRANS\n protocol esp integrity sha-256\n\nIf the ASA is not configured to use a FIPS-validated cryptographic module to generate cryptographic hashes, this is a finding."
discussion = "FIPS 140-2 precludes the use of invalidated cryptography for the cryptographic protection of sensitive or valuable data within Federal systems. Unvalidated cryptography is viewed by NIST as providing no protection to the information or data. In effect, the data would be considered unprotected plain text. If the agency specifies that the information or data be cryptographically protected, then FIPS 140-2 is applicable. In essence, if cryptography is required, it must be validated. Cryptographic modules that have been approved for classified use may be used in lieu of modules that have been validated against the FIPS 140-2 standard.\n\nThe cryptographic module used must have at least one validated hash algorithm. This validated hash algorithm must be used to generate cryptographic hashes for all cryptographic security function within the product being evaluated."
fix = "Configure the ASA to use a FIPS-validated cryptographic module to generate cryptographic hashes as shown in the examples below.\n\nASA1(config)# crypto ikev2 policy 1\nASA1(config-ikev2-policy)# integrity sha256\nASA1(config-ikev2-policy)# exit\n\nASA1(config)# crypto ipsec ikev2 ipsec-proposal IPSEC_TRANS\nASA1(config-ipsec-proposal)# protocol esp integrity sha-256\nASA1(config-ipsec-proposal)# end"
ccis = [2450]

