[[checks]]
pk = '8f0c0437-ae5c-4e26-8bda-ba41ba58d1f2'
title = 'The Cisco ASA must be configured to use FIPS-validated SHA-1 or higher for Internet Key Exchange (IKE) Phase 2.'
human_id = 'CASA-VN-000240'
group_title = 'SRG-NET-000230-VPN-000780'
nist_impact = 4
vulnerability_id = 'CASA-VN-000240'
rule_id = 'CASA-VN-000240_rule'
content = "Review the ASA configuration to verify that SHA-2 or higher is specified for IKE Phase 2 as shown in the example below.\n\nStep 1: Review the crypto map for IKE Phase 2.\n\ncrypto map IPSEC_MAP 10 set ikev2 ipsec-proposal AES_SHA\n\nStep 2: Verify that the proposal specifies SHA-1 or higher.\n\ncrypto ipsec ikev2 ipsec-proposal AES_SHA\n protocol esp encryption …\n protocol esp integrity sha-384 sha-256\n\nIf the ASA is not configured to use SHA-1 or higher for IKE Phase 2, this is a finding."
discussion = "Authenticity protection provides protection against man-in-the-middle attacks/session hijacking and the insertion of false information into sessions.\n\nAlthough allowed by SP800-131Ar1 for some applications, SHA-1 is considered a compromised hashing standard and is being phased out of use by industry and Government standards. Unless required for legacy use, DoD systems should not be configured to use SHA-1 for integrity of remote access sessions. For digital signature verification, SHA-1 is allowed for legacy use. For all other hash function applications (e.g., HMAC, KDFs, RBG, password hashing, checksum integrity checks), the use of SHA-1 is acceptable, but discouraged in DoD.\n\nThis requirement focuses on communications protection for the application session rather than for the network packet and establishes grounds for confidence at both ends of communications sessions in ongoing identities of other parties and in the validity of information transmitted. Depending on the required degree of confidentiality and integrity, web services/SOA will require the use of mutual authentication (two-way/bidirectional).\n\nAn IPsec Security Associations (SA) is established using either IKE or manual configuration."
fix = "Configure the ASA to use FIPS-validated SHA-2 or higher for IKE Phase 2.\n\nStep 1: Configure the IKE Phase 2 proposal as shown in the example below.\n\nASA1(config)# crypto ipsec ikev2 ipsec-proposal AES_SHA\nASA1(config-ipsec-proposal)# protocol esp integrity sha-384 sha-256\nASA1(config-ipsec-proposal)# exit\n\nStep 2: Configure the crypto map using the configured proposal.\n\nASA1(config)# crypto map IPSEC_MAP 10 set ikev2 ipsec-proposal\nASA1(config)# end"
ccis = [1184]

