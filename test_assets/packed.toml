content = "Verify that the ASA uses SHA-2 at 384 bits or greater for hashing to protect the integrity of IPsec remote access sessions as shown in the example below.\n\nStep 1: Verify that SHA-2 at 384 bits or greater is used for IKE Phase 1 as shown in the example below.\n\ncrypto ikev2 policy 1\n…\n…\n…\n integrity sha384\n\nStep 2: Verify that SHA-2 at 384 bits or greater is used for the IPsec Security Association.\n\ncrypto ipsec ikev2 ipsec-proposal IPSEC_TRANS\n protocol esp integrity sha-384\n\nIf the ASA does not use SHA-2 at 384 bits or greater for hashing to protect the integrity of IPsec remote access sessions, this is a finding."
discussion = "Without strong cryptographic integrity protections, information can be altered by unauthorized users without detection.\n\nSHA-1 is considered a compromised hashing standard and is being phased out of use by industry and Government standards. DOD systems must not be configured to use SHA-1 for integrity of remote access sessions.\n\nThe remote access VPN provides access to DOD nonpublic information systems by an authorized user (or an information system) communicating through an external, non-organization-controlled network."
fix = "Configure the ASA to use SHA-2 at 384 bits or greater for hashing to protect the integrity of IPsec remote access sessions as shown in the example below.\n\nASA1(config)# crypto ikev2 policy 1\nASA1(config-ikev2-policy)# integrity sha384\nASA1(config-ikev2-policy)# exit\nASA1(config)# crypto ipsec ikev2 ipsec-proposal IPSEC_TRANS\nASA1(config-ipsec-proposal)# protocol esp integrity sha-384\nASA1(config-ikev2-policy)# end"
ccis = [1453]

[[checks]]
pk = '1f504d43-3181-49fd-b020-9315de6794b3'
title = 'The Cisco VPN remote access server must be configured to use AES encryption for the Internet Key Exchange (IKE) Phase 1 to protect confidentiality of remote access sessions.'
human_id = 'CASA-VN-000640'
group_title = 'SRG-NET-000317-VPN-001090'
nist_impact = 4
vulnerability_id = 'V-239979'
rule_id = 'SV-239979r666343_rule'
content = "Verify IKE Phase 1 is set to use an AES encryption algorithm as shown in the example below.\n\ncrypto ipsec ikev2 ipsec-proposal IPSEC_TRANS\n protocol esp encryption aes-192\n\nIf the value of the encryption algorithm for IKE Phase 1 is not set to use an AES algorithm, this is a finding."
discussion = "Without confidentiality protection mechanisms, unauthorized individuals may gain access to sensitive information via a remote access session.\n\nRemote access is access to DoD non-public information systems by an authorized user (or an information system) communicating through an external, non-organization-controlled network.\n\nAES is the FIPS-validated cipher block cryptographic algorithm approved for use in DoD. For an algorithm implementation to be listed on a FIPS 140-2 cryptographic module validation certificate as an approved security function, the algorithm implementation must meet all the requirements of FIPS 140-2 and must successfully complete the cryptographic algorithm validation process. Currently, NIST has approved the following confidentiality modes to be used with approved block ciphers in a series of special publications: ECB, CBC, OFB, CFB, CTR, XTS-AES, FF1, FF3, CCM, GCM, KW, KWP, and TKW."
fix = "Configure the ASA to use AES encryption algorithm for IKE Phase 1 as shown in the example below.\n\nASA1(config)# crypto ikev2 policy 1\nASA1(config-ikev2-policy)# encryption aes-192"
ccis = [68]

