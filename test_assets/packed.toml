[[checks]]
pk = '5d9e7b6c-02a9-47cd-86ff-537264abb61d'
title = 'The Cisco ASA must be configured to generate an alert that can be forwarded as an alert to the SCA and ISSO of all log failure events.'
human_id = 'CASA-VN-000090'
group_title = 'SRG-NET-000335-VPN-001270'
nist_impact = 3
vulnerability_id = 'CASA-VN-000090'
rule_id = 'CASA-VN-000090_rule'
content = "Review the Cisco ASA configuration to verify that it is compliant with this requirement as shown in the example below.\n\nlogging trap critical\nlogging host NDM_INTERFACE 10.1.48.10\n\nNote: The parameter \"critical\" can replaced with a lesser severity (i.e., error, warning, notice, informational).\n\nIf the Cisco ASA is not configured to generate an alert that can be forwarded to the SCA and ISSO of all log failure events, this is a finding."
discussion = "It is critical for the appropriate personnel to be aware if a system is at risk of failing to process audit logs as required. Without a real-time alert, security personnel may be unaware of an impending failure of the audit capability and system operation may be adversely affected.\n\nAlerts provide organizations with urgent messages. Automated alerts can be conveyed in a variety of ways, including, for example, telephonically, via electronic mail, via text message, or via websites. Log processing failures include software/hardware errors, failures in the log capturing mechanisms, and log storage capacity being reached or exceeded.\n\nWhile this requirement also applies to the event monitoring system (e.g., Syslog, Security Information and Event Management [SIEM], or SNMP servers), the VPN Gateway must also be configured to generate a message to the administrator console.\n\nThe VPN daemon facility and log facility are messages in the log, which capture actions performed or errors encountered by system processes."
fix = "Configure the Cisco ASA to send critical to emergency log messages to the syslog server as shown in the example below.\n\nASA(config)# logging host NDM_INTERFACE 10.1.48.10\nASA(config)# logging trap critical\nASA(config)# end\n\nNote: The parameter \"critical\" can replaced with a lesser severity (i.e., error, warning, notice, informational)."
ccis = [1858]

